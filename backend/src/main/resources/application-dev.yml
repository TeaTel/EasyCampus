# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_market_dev?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true&rewriteBatchedStatements=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: '123456'
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000

  # 邮件服务配置（密码重置验证码）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8

  sql:
    init:
      encoding: UTF-8
      mode: never

  # 延迟初始化，给数据库更多时间启动
  main:
    lazy-initialization: false

  # 开发环境允许跨域
  web:
    cors:
      allowed-origins: "http://localhost:3000"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: true

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.campus.backend.entity
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 3000
    default-fetch-size: 100

server:
  port: 8080

# 开发环境日志级别
logging:
  level:
    com.campus.backend: DEBUG
    org.springframework.security: DEBUG

# 文件上传配置
app:
  upload:
    base-path: ./uploads
    image-max-size: 10485760  # 10MB
    avatar-max-size: 5242880  # 5MB
    allowed-types: image/jpeg,image/png,image/webp
    allowed-extensions: jpg,jpeg,png,webp
    compression-quality: 0.8
    max-width: 1920
    max-height: 1080
    chunk-size: 2097152  # 2MB per chunk
    temp-path: ./uploads/temp