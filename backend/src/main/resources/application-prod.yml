# 生产环境配置
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql.railway.internal}:${DB_PORT:3306}/${DB_NAME:railway}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=60000&socketTimeout=60000
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:twdrRMIivFTsXgAakbkBJzTLJdmpoArP}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 60000  # 60秒连接超时
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      initialization-fail-timeout: 60000  # 60秒初始化失败超时
  
  sql:
    init:
      encoding: UTF-8
      mode: never
  
  # 关键修复：禁用延迟初始化确保所有Bean立即创建
  # 诊断发现：有依赖的Controller未注册，可能因lazy-init导致Service未及时初始化
  main:
    lazy-initialization: false
    allow-circular-references: true
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # CORS 配置：生产环境限制为具体域名
  web:
    cors:
      allowed-origins: "https://c2cmarket.store,https://www.c2cmarket.store"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
      allowed-headers: "*"
      allow-credentials: true

  # 邮件服务配置（163邮箱 SMTP）
  mail:
    host: smtp.163.com
    port: 465
    username: ${MAIL_USERNAME:teatel0125@163.com}
    password: ${MAIL_PASSWORD:SMcv3AX6WVbcUnBh}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465

  # Redis配置 - 禁用Redis，使用内存缓存
  data:
    redis:
      enabled: false
  # 禁用Redis自动配置
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.campus.backend.entity
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 3000
    default-fetch-size: 100

server:
  port: ${PORT:8080}
  # 生产环境建议启用压缩
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

# 生产环境日志配置
logging:
  level:
    com.campus.backend: INFO
    org.springframework: WARN
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

# JWT配置（生产环境建议使用更强的密钥）
jwt:
  secret: ${JWT_SECRET:your-production-jwt-secret-key-change-this-in-production}
  expiration: 86400000 # 24小时

# 文件上传配置（生产环境）
app:
  upload:
    base-path: ${APP_UPLOAD_BASE_PATH:./uploads}
    image-max-size: 10485760
    avatar-max-size: 5242880
    allowed-types: image/jpeg,image/png,image/webp
    allowed-extensions: jpg,jpeg,png,webp
    compression-quality: 0.8
    max-width: 1920
    max-height: 1080
    chunk-size: 2097152
    temp-path: ${APP_UPLOAD_BASE_PATH:./uploads}/temp

# 生产环境安全配置
security:
  require-ssl: false

# 生产环境Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: "health,info"
      base-path: "/actuator"
  endpoint:
    health:
      show-details: never  # 生产环境不显示详细信息
      show-components: never
      probes:
        enabled: true
      db:
        enabled: true
      diskspace:
        enabled: true
      ping:
        enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
    defaults:
      enabled: true