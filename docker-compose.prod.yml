# 校园二手交易平台 - 生产环境 Docker Compose 编排
# 使用方式: docker compose -f docker-compose.prod.yml up -d

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-Campus2026!}
      MYSQL_DATABASE: campus_market
      MYSQL_USER: campus_user
      MYSQL_PASSWORD: ${DB_USER_PASSWORD:-CampusUser2026!}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema-mysql.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/data-mysql.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
      - ./backend/src/main/resources/migration-v2.sql:/docker-entrypoint-initdb.d/03-migration-v2.sql:ro
      - ./backend/src/main/resources/migration-v3.sql:/docker-entrypoint-initdb.d/04-migration-v3.sql:ro
      - ./backend/src/main/resources/migration-v4-community.sql:/docker-entrypoint-initdb.d/05-migration-v4.sql:ro
      - ./backend/src/main/resources/migration-v5-ad.sql:/docker-entrypoint-initdb.d/06-migration-v5.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-Campus2026!}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Spring Boot 后端（含前端静态文件）
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: campus_market
      DB_USER: campus_user
      DB_PASSWORD: ${DB_USER_PASSWORD:-CampusUser2026!}
      JWT_SECRET: ${JWT_SECRET:-campus-jwt-secret-prod-2026-change-me}
      # 上传文件存储路径（容器内）
      APP_UPLOAD_BASE_PATH: /app/uploads
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - upload_data:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Nginx 反向代理 + SSL 终止
  nginx:
    image: nginx:alpine
    container_name: campus-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - upload_data:/app/uploads:ro

volumes:
  mysql_data:
  upload_data:
